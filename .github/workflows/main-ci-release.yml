name: Main CI + Release Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (fmt, test, race, ws smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          UNFORMATTED="$(gofmt -l ./cmd ./internal)"
          if [ -n "${UNFORMATTED}" ]; then
            echo "Unformatted files found:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Run unit and integration tests
        run: go test ./...

      - name: Run race detector
        run: go test -race ./...

      - name: Verify deterministic test-data generation
        run: |
          go run ./cmd/generate-testdata -out /tmp/transactions-a.json -count 800
          go run ./cmd/generate-testdata -out /tmp/transactions-b.json -count 800
          test -s /tmp/transactions-a.json
          cmp -s /tmp/transactions-a.json /tmp/transactions-b.json

      - name: WebSocket smoke test
        run: |
          WS_INGEST_ENABLED=true HTTP_ADDR=:18080 go run ./cmd/server > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT

          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:18080/status" >/dev/null; then
              break
            fi
            sleep 1
          done

          go run ./cmd/ws-demo -url ws://localhost:18080/events/stream
          go run ./cmd/ws-demo -url ws://localhost:18080/events/stream -scenario degraded -psp PSP_GAMMA -batch
          curl -fsS "http://localhost:18080/alerts?psp=PSP_GAMMA&active_only=true" >/dev/null

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  security-static:
    name: Security & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  release-artifacts:
    name: Build & Upload Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - backend
      - frontend
      - security-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release bundle
        run: |
          mkdir -p dist/release

          GOOS=linux GOARCH=amd64 go build -o dist/release/server-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=amd64 go build -o dist/release/ws-demo-linux-amd64 ./cmd/ws-demo

          go run ./cmd/generate-testdata -out dist/release/transactions.json -count 800

          cp README.md dist/release/
          cp docs/openapi.yaml dist/release/
          cp docs/api.md dist/release/
          cp docs/architecture.md dist/release/

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: dist/release
          if-no-files-found: error
